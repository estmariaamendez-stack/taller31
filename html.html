<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Cohen-Sutherland
    </title>

    <style>

        body{

            margin: 0;

            font-family: Arial, sans-serif;

            background: linear-gradient(
                to right,
                #dbeafe,
                #f3f4f6
            );

            display: flex;

            justify-content: center;

            padding: 30px;
        }

        .contenedor{

            background-color: white;

            padding: 25px;

            border-radius: 15px;

            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);

            text-align: center;

            width: fit-content;
        }

        h1{

            color: #111827;

            margin-bottom: 10px;
        }

        h2{

            color: #374151;

            margin-top: 0;
        }

        .info{

            margin-bottom: 20px;
        }

        label{

            font-weight: bold;
        }

        input{

            width: 80px;

            padding: 5px;

            margin-right: 10px;

            border-radius: 5px;

            border: 1px solid gray;
        }

        button{

            padding: 10px 15px;

            margin: 10px 5px;

            border: none;

            border-radius: 8px;

            background-color: #2563eb;

            color: white;

            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        button:hover{

            background-color: #1d4ed8;
        }

        canvas{

            border: 2px solid #d1d5db;

            border-radius: 10px;

            background-color: #f9fafb;
        }

        .leyenda{

            margin-top: 15px;

            text-align: left;

            display: inline-block;

            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <h1>
            Algoritmo Cohen-Sutherland
        </h1>

        <h2 id="tituloCaso">
            Caso
        </h2>

        <p id="descripcionCaso">
            Visualización del algoritmo.
        </p>

        <!-- VIEWPORT -->

        <div class="info">

            <label>Xmin:</label>

            <input
                type="number"
                id="xminInput"
                value="200">

            <label>Ymin:</label>

            <input
                type="number"
                id="yminInput"
                value="150">

            <label>Xmax:</label>

            <input
                type="number"
                id="xmaxInput"
                value="600">

            <label>Ymax:</label>

            <input
                type="number"
                id="ymaxInput"
                value="450">

            <button onclick="actualizarViewport()">
                Actualizar Viewport
            </button>

        </div>

        <!-- CANVAS -->

        <canvas
            id="canvas"
            width="800"
            height="600">
        </canvas>

        <!-- BOTONES -->

        <div>

            <button onclick="anterior()">
                ⬅ Anterior
            </button>

            <button onclick="siguiente()">
                Siguiente ➡
            </button>

        </div>

        <!-- LEYENDA -->

        <div class="leyenda">

            <div style="color:gray;">
                ■ Línea Original
            </div>

            <div style="color:red;">
                ■ Línea Recortada
            </div>

            <div style="color:blue;">
                ■ Viewport
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
